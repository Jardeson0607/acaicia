<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Açaí & Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0b14;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#140d1f;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.logo span{
font-size:22px;
font-weight:600;
}

.header-btn{
background:#25D366;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:500;
}

/* HERO */

.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:linear-gradient(135deg,#4c1d95,#7e22ce);
}

.hero-content{
max-width:700px;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
opacity:0.9;
margin-bottom:35px;
}

.cta{
background:#25D366;
padding:18px 40px;
border-radius:10px;
font-size:20px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.25s;
}

.cta:hover{
transform:scale(1.05);
}

/* LOCAL */

.local{
padding:70px 20px;
background:#1a1225;
text-align:center;
}

.local h2{
font-size:30px;
margin-bottom:10px;
}

.endereco{
font-size:17px;
opacity:0.9;
margin-bottom:30px;
}

iframe{
width:90%;
max-width:700px;
height:320px;
border-radius:12px;
border:none;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:30px;
text-decoration:none;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:#0c0813;
font-size:14px;
opacity:0.7;
}

/* RESPONSIVO */

@media(max-width:768px){

.hero h1{
font-size:34px;
}

.hero p{
font-size:16px;
}

.cta{
font-size:18px;
padding:16px 30px;
}

header{
padding:15px 6%;
}

.logo span{
font-size:18px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.jpeg">
<span>Açaí & Cia</span>
</div>

<a class="header-btn"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido">
Pedir
</a>

</header>

<section class="hero">

<div class="hero-content">

<h1>O melhor açaí de Senador Pompeu</h1>

<p>Peça agora pelo WhatsApp e aproveite o melhor açaí da região.</p>

<a class="cta"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido">
Fazer Pedido
</a>

</div>

</section>

<section class="local">

<h2>📍 Onde estamos</h2>

<div class="endereco">
R. São Pedro, 5<br>
Bairro Caracará<br>
Senador Pompeu - CE
</div>

<iframe
src="https://maps.google.com/maps?q=R.%20São%20Pedro%205%20Senador%20Pompeu%20CE&output=embed">
</iframe>

</section>

<footer>
© 2026 Açaí & Cia • Senador Pompeu
</footer>

<a class="whatsapp"
href="https://wa.me/5588996888480">
💬
</a>

</body>
</html>
