<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Açaí & Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0e0e0e;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid #222;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:55px;
border-radius:10px;
}

.nome{
line-height:1;
}

.nome h1{
font-size:22px;
}

.nome span{
font-size:16px;
opacity:0.8;
}

/* HORÁRIO NO TOPO */

.topo-info{
display:flex;
align-items:center;
}

.horario-topo{
font-size:14px;
opacity:0.8;
font-weight:500;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px 70px;
max-width:900px;
margin:auto;
}

.hero h2{
font-size:42px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
opacity:0.85;
margin-bottom:35px;
}

.botao{
background:#25D366;
padding:18px 40px;
border-radius:10px;
text-decoration:none;
font-size:20px;
color:white;
font-weight:600;
display: inline-block; /* Garante o formato de botão */
cursor: pointer;
}

/* GALERIA */

.galeria{
padding:60px 20px;
text-align:center;
background:#141414;
}

.galeria h3{
font-size:28px;
margin-bottom:30px;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
scroll-snap-type:x mandatory;
}

.carousel img{
width:300px;
border-radius:14px;
scroll-snap-align:center;
}

/* LOCAL */

.local{
padding:80px 20px;
text-align:center;
}

.local h3{
font-size:28px;
margin-bottom:10px;
}

.endereco{
opacity:0.85;
margin-bottom:15px;
}

.horario{
font-size:16px;
margin-bottom:30px;
color:#25D366;
font-weight:500;
}

iframe{
width:90%;
max-width:700px;
height:320px;
border:none;
border-radius:12px;
}

/* BOTÃO WHATSAPP FLUTUANTE */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:30px;
text-decoration:none;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
z-index: 1000;
cursor: pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:#0a0a0a;
font-size:14px;
opacity:0.7;
}

/* RESPONSIVO */

@media(max-width:768px){

.hero h2{
font-size:32px;
}

.hero p{
font-size:16px;
}

.botao{
font-size:18px;
padding:16px 30px;
}

.carousel img{
width:230px;
}

.horario-topo{
font-size:12px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.jpg">

<div class="nome">
<h1>Açaí</h1>
<span>& Cia</span>
</div>

</div>

<div class="topo-info">
<span class="horario-topo">🕒 17h – 22h</span>
</div>

</header>

<section class="hero">

<h2>O melhor açaí de Senador Pompeu</h2>

<p>Peça agora pelo WhatsApp e aproveite o verdadeiro sabor do açaí.</p>

<a class="botao" onclick="abrirWhats()">
Pedir no WhatsApp </a>

</section>

<section class="galeria">

<h3>Nossos Açaí</h3>

<div class="carousel">

<img src="acai1.jpeg">
<img src="acai2.jpeg">
<img src="acai3.jpeg">

</div>

</section>

<section class="local">

<h3>📍 Localização</h3>

<div class="endereco">
R. São Pedro, 5<br>
Bairro Caracará<br>
Senador Pompeu - CE
</div>

<div class="horario">
🕒 Funcionamento: 17h às 22h
</div>

<iframe
src="https://maps.google.com/maps?q=R.%20São%20Pedro%2043%20Senador%20Pompeu%20CE&output=embed">
</iframe>

</section>

<footer>
© 2026 Açaí & Cia
</footer>

<a class="whatsapp" onclick="abrirWhats()">
💬 </a>

<script>
    function abrirWhats() {
        const telefone = "5588996888480";
        const texto = "Olá, gostaria de fazer meu pedido! 💜";
        const url = "https://api.whatsapp.com/send?phone=" + telefone + "&text=" + encodeURIComponent(texto);
        window.location.href = url;
    }
</script>

</body>
</html>
