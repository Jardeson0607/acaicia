<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Açaí & Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f0f14;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#0f0f14;
}

.logo{
font-size:22px;
font-weight:700;
color:#a855f7;
}

.nav-btn{
background:#25D366;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:600;
}

/* HERO */

.hero{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
height:85vh;
padding:20px;
background:linear-gradient(135deg,#581c87,#9333ea);
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
max-width:500px;
opacity:0.9;
margin-bottom:30px;
}

.cta{
background:#25D366;
padding:18px 40px;
border-radius:10px;
font-size:20px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.25s;
}

.cta:hover{
transform:scale(1.05);
}

/* LOCAL */

.local{
padding:70px 20px;
text-align:center;
background:#151520;
}

.local h2{
font-size:30px;
margin-bottom:15px;
}

.endereco{
font-size:17px;
opacity:0.9;
margin-bottom:35px;
}

/* MAPA */

.mapa{
display:flex;
justify-content:center;
}

iframe{
width:90%;
max-width:700px;
height:320px;
border-radius:12px;
border:none;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:28px;
color:white;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:#0c0c11;
font-size:14px;
opacity:0.7;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:34px;
}

.hero p{
font-size:16px;
}

.cta{
font-size:18px;
padding:16px 30px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">Açaí & Cia 🍇</div>

<a class="nav-btn"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido">
Pedir
</a>

</nav>

<section class="hero">

<h1>O melhor açaí de Senador Pompeu</h1>

<p>Peça agora pelo WhatsApp e aproveite uma experiência irresistível.</p>

<a class="cta"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido%20de%20açaí">
Fazer Pedido
</a>

</section>

<section class="local">

<h2>📍 Localização</h2>

<div class="endereco">
R. São Pedro, 5<br>
Bairro Caracará<br>
Senador Pompeu - CE
</div>

<div class="mapa">

<iframe 
src="https://maps.google.com/maps?q=R.%20São%20Pedro%205%20Senador%20Pompeu%20CE&t=&z=15&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<br><br>

<a class="cta"
href="https://www.google.com/maps?q=R.%20São%20Pedro%205%20Senador%20Pompeu%20CE"
target="_blank">
Abrir no Google Maps
</a>

</section>

<footer>
© 2026 Açaí & Cia • Senador Pompeu
</footer>

<a class="whatsapp"
href="https://wa.me/5588996888480">
💬
</a>

</body>
</html>
