<!DOCTYPE html>

<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Açaí & Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
padding:30px;
z-index:10;
}

.logo{
text-align:center;
}

.logo img{
width:70px;
border-radius:12px;
margin-bottom:8px;
}

.logo h1{
font-size:26px;
font-weight:700;
line-height:1;
}

.logo span{
font-size:18px;
opacity:0.8;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1615486363743-6f2b0b9a7e3d") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
max-width:700px;
padding:20px;
}

.hero h2{
font-size:54px;
margin-bottom:15px;
animation:fadeUp 1s ease;
}

.hero p{
font-size:18px;
opacity:0.9;
margin-bottom:35px;
animation:fadeUp 1.3s ease;
}

.cta{
background:#25D366;
padding:18px 45px;
border-radius:12px;
font-size:20px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.25s;
animation:fadeUp 1.6s ease;
}

.cta:hover{
transform:scale(1.07);
}

/* LOCAL */

.local{
padding:80px 20px;
text-align:center;
background:#121212;
}

.local h3{
font-size:30px;
margin-bottom:15px;
}

.endereco{
font-size:17px;
opacity:0.85;
margin-bottom:35px;
}

iframe{
width:90%;
max-width:700px;
height:320px;
border:none;
border-radius:14px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:30px;
text-decoration:none;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:#090909;
font-size:14px;
opacity:0.6;
}

/* ANIMATION */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

.hero h2{
font-size:36px;
}

.hero p{
font-size:16px;
}

.cta{
font-size:18px;
padding:16px 30px;
}

.logo img{
width:60px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.jpg">
<h1>Açaí</h1>
<span>& Cia</span>
</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>O melhor açaí de Senador Pompeu</h2>

<p>Peça agora pelo WhatsApp e aproveite o verdadeiro sabor do açaí.</p>

<a class="cta"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido">
Fazer Pedido </a>

</div>

</section>

<section class="local">

<h3>📍 Localização</h3>

<div class="endereco">
R. São Pedro, 5<br>
Bairro Caracará<br>
Senador Pompeu - CE
</div>

<iframe
src="https://maps.google.com/maps?q=R.%20São%20Pedro%205%20Senador%20Pompeu%20CE&output=embed">
</iframe>

</section>

<footer>
© 2026 Açaí & Cia
</footer>

<a class="whatsapp"
href="https://wa.me/5588996888480">
💬 </a>

</body>
</html>
