<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Açaí & Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:#0e0e0e;
color:white;
}

/* HEADER */

header{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:100;
}

.logo{
font-size:22px;
font-weight:700;
color:#fff;
}

.header-btn{
background:#25D366;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:500;
}

/* HERO */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1590080875515-8a3a8dc5735e") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
text-shadow:0 4px 10px rgba(0,0,0,0.6);
}

.hero p{
font-size:20px;
margin-bottom:25px;
opacity:0.9;
}

.btn{
background:#25D366;
padding:18px 40px;
border-radius:12px;
text-decoration:none;
font-size:20px;
color:white;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.07);
}

/* LOCAL */

.local{
padding:80px 20px;
text-align:center;
background:#151515;
}

.local h2{
font-size:32px;
margin-bottom:15px;
}

.endereco{
font-size:18px;
margin-bottom:30px;
opacity:0.9;
}

/* MAPA */

iframe{
width:90%;
max-width:700px;
height:320px;
border:none;
border-radius:12px;
}

/* WHATSAPP FIXO */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
font-size:28px;
padding:16px 20px;
border-radius:50%;
text-decoration:none;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* FOOTER */

footer{
background:#0a0a0a;
padding:25px;
text-align:center;
font-size:14px;
opacity:0.7;
}

/* RESPONSIVO */

@media(max-width:768px){

.hero h1{
font-size:36px;
}

.hero p{
font-size:16px;
}

.btn{
font-size:18px;
padding:16px 30px;
}

header{
padding:15px 20px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">Açaí & Cia 🍇</div>

<a class="header-btn"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido">
Pedir no WhatsApp
</a>

</header>

<section class="hero">

<h1>O melhor açaí da região</h1>

<p>Peça agora e tenha uma experiência irresistível</p>

<a class="btn"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido%20de%20açaí">
Fazer Pedido
</a>

</section>

<section class="local">

<h2>📍 Onde estamos</h2>

<div class="endereco">
Rua São Pedro • Bairro Caracará<br>
Senador Pompeu - CE
</div>

<iframe
src="https://www.google.com/maps?q=Senador+Pompeu+CE&output=embed">
</iframe>

</section>

<footer>
© 2026 Açaí & Cia • Senador Pompeu
</footer>

<a class="whatsapp"
href="https://wa.me/5588996888480">
💬
</a>

</body>
</html>
