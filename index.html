<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Açaí & Cia</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#0e0e0e;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#0e0e0e;
border-bottom:1px solid #222;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{
width:55px;
border-radius:10px;
}

.nome{
line-height:1;
}

.nome h1{
font-size:22px;
}

.nome span{
font-size:16px;
opacity:0.8;
}

.botao-topo{
background:#25D366;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:600;
}

/* HERO */

.hero{
padding:100px 20px;
text-align:center;
max-width:900px;
margin:auto;
}

.hero h2{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:18px;
opacity:0.85;
margin-bottom:35px;
}

.botao{
background:#25D366;
padding:18px 40px;
border-radius:10px;
text-decoration:none;
font-size:20px;
color:white;
font-weight:600;
}

/* LOCAL */

.local{
padding:80px 20px;
text-align:center;
background:#151515;
}

.local h3{
font-size:28px;
margin-bottom:10px;
}

.endereco{
opacity:0.85;
margin-bottom:30px;
}

iframe{
width:90%;
max-width:700px;
height:320px;
border:none;
border-radius:10px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:28px;
text-decoration:none;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:#0a0a0a;
font-size:14px;
opacity:0.7;
}

/* MOBILE */

@media(max-width:768px){

.hero h2{
font-size:34px;
}

.hero p{
font-size:16px;
}

.botao{
font-size:18px;
padding:16px 30px;
}

}

</style>

</head>

<body>

<header>

<div class="logo-area">

<img src="logo.jpg">

<div class="nome">
<h1>Açaí</h1>
<span>& Cia</span>
</div>

</div>

<a class="botao-topo"
href="https://wa.me/5588996888480">
Pedir
</a>

</header>

<section class="hero">

<h2>O melhor açaí de Senador Pompeu</h2>

<p>Peça agora pelo WhatsApp e aproveite o verdadeiro sabor do açaí.</p>

<a class="botao"
href="https://wa.me/5588996888480?text=Olá,%20quero%20fazer%20um%20pedido">
Fazer Pedido
</a>

</section>

<section class="local">

<h3>📍 Localização</h3>

<div class="endereco">
R. São Pedro, 5<br>
Bairro Caracará<br>
Senador Pompeu - CE
</div>

<iframe
src="https://maps.google.com/maps?q=R.%20São%20Pedro%205%20Senador%20Pompeu%20CE&output=embed">
</iframe>

</section>

<footer>
© 2026 Açaí & Cia
</footer>

<a class="whatsapp"
href="https://wa.me/5588996888480">
💬
</a>

</body>
</html>
